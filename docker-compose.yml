services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "make ntru-oqxt-setup && make ntru-oqxt-search && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - redis
    restart: unless-stopped
    # We expose the API on 8000 which the frontend can reach directly

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      target: development
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
