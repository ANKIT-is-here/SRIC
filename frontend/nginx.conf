server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Single Page Application routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container
    location ~ ^/(stats|upload|search|conjunctive-search|reset|download) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase upload limit for larger document sets or databases
        client_max_body_size 100M;
    }
}
